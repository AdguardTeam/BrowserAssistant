---
version: 2
plan:
  project-key: ADGEXT
  key: BABETAFFSPECS
  name: browser assistant - build beta firefox

stages:
  - Build:
      manual: false
      final: false
      jobs:
        - Build

Build:
  key: BUILD
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            # 'set' should be added to the beginning of each script to ensure that it runs with the correct options.
            #  -e: Exit immediately if any command exits with a non-zero status (i.e., if a command fails).
            #  -x: Print each command to the terminal as it is executed, which is useful for debugging.
            set -ex

            # Fix mixed logs
            exec 2>&1

            export DOCKER_BUILDKIT=1

            # Generate find-compatible .gitignore exclusions on the host (where .git is available).
            # The gitignore-excludes.txt file is included in the Docker context and consumed by
            # archive-source.sh inside Docker (where .git is not available).
            ./bamboo-specs/scripts/generate-find-excludes.sh gitignore-excludes.txt

            # source.zip is created inside Docker via archive-source.sh.
            # go-webext Firefox signing runs inside the build-beta-firefox stage.
            docker build \
              --file Dockerfile \
              --progress plain \
              --build-arg TEST_RUN_ID=${bamboo.buildNumber} \
              --secret id=CREDENTIALS_PASSWORD,env=bamboo_extensionsPassphrase \
              --secret id=FIREFOX_CLIENT_ID,env=bamboo_firefoxAmoClientId \
              --secret id=FIREFOX_CLIENT_SECRET,env=bamboo_firefoxAmoClientSecret \
              --target build-beta-firefox-output \
              --output type=local,dest=output \
              .
    - inject-variables:
        file: output/artifacts/build.txt
        scope: RESULT
        namespace: inject
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - "./bamboo-specs/scripts/cleanup.sh output/artifacts/build.txt,output/artifacts/firefox.xpi,output/artifacts/firefox.zip,output/artifacts/update.json,output/artifacts/source.zip"
  artifacts:
    - name: firefox.xpi
      location: output/artifacts
      pattern: firefox.xpi
      shared: true
      required: true
    - name: update.json
      location: output/artifacts
      pattern: update.json
      shared: true
      required: true
    - name: build.txt
      location: output/artifacts
      pattern: build.txt
      shared: true
      required: true
    - name: firefox.zip
      location: output/artifacts
      pattern: firefox.zip
      shared: true
      required: true
    - name: source.zip
      location: output/artifacts
      pattern: source.zip
      shared: true
      required: true
  requirements:
    - extension: 'true'

triggers: []

branches:
  create: manually
  delete: never
  link-to-jira: true

labels: []
other:
  concurrent-build-plugin: system-default
